services:
  python:
    build: .
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_USER}
    networks:
      - omni-network
  db:
    image: postgres:16-bookworm
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
    ports:
      - "5432:5432"
    volumes:
      - omni_pg_data:/var/lib/postgresql/data
    networks:
      - omni-network

volumes:
  omni_pg_data:
networks:
  omni-network:
